# 手动推送 tag 时触发：通知 ck-infra 更新镜像 tag
name: Notify Infra

on:
  push:
    tags:
      - 'a-v*'
      - 'b-v*'

permissions:
  contents: read

env:
  INFRA_REPO: zhang-zixu/ck-infra

jobs:
  notify-project-a:
    if: startsWith(github.ref_name, 'a-v')
    runs-on: ubuntu-latest
    steps:
      - name: 通知 ck-infra 更新 project-a 镜像 tag
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: ${{ env.INFRA_REPO }}
          event-type: image-published
          client-payload: >-
            {"project":"project-a","tag":"${{ github.ref_name }}"}

  notify-project-b:
    if: startsWith(github.ref_name, 'b-v')
    runs-on: ubuntu-latest
    steps:
      - name: 通知 ck-infra 更新 project-b 镜像 tag
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: ${{ env.INFRA_REPO }}
          event-type: image-published
          client-payload: >-
            {"project":"project-b","tag":"${{ github.ref_name }}"}
