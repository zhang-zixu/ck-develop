name: Release on Main

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      project_a: ${{ steps.filter.outputs.project_a }}
      project_b: ${{ steps.filter.outputs.project_b }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            project_a:
              - 'project-a/**'
            project_b:
              - 'project-b/**'

  # 所有 tag 和版本提交在同一个 job 内顺序完成，最后只 push 一次，避免并行冲突
  release:
    needs: detect-changes
    if: needs.detect-changes.outputs.project_a == 'true' || needs.detect-changes.outputs.project_b == 'true'
    runs-on: ubuntu-latest
    outputs:
      project_a_released: ${{ steps.release_a.outputs.released }}
      project_a_tag: ${{ steps.release_a.outputs.tag }}
      project_b_released: ${{ steps.release_b.outputs.released }}
      project_b_tag: ${{ steps.release_b.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 发布 project-a
        id: release_a
        if: needs.detect-changes.outputs.project_a == 'true'
        uses: ./.github/actions/release-project
        with:
          project_dir: project-a
          tag_prefix: a

      - name: 发布 project-b
        id: release_b
        if: needs.detect-changes.outputs.project_b == 'true'
        uses: ./.github/actions/release-project
        with:
          project_dir: project-b
          tag_prefix: b

      - name: 推送 tag 和版本提交
        if: steps.release_a.outputs.released == 'true' || steps.release_b.outputs.released == 'true'
        run: git push origin main --tags

  docker-project-a:
    needs: release
    if: needs.release.outputs.project_a_released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 登录 Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 project-a Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: ./project-a
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/project-a:${{ needs.release.outputs.project_a_tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}/project-a:latest

      # 暂时禁用：SSH 部署到服务器（需要时取消注释即可恢复）
      # - name: Deploy to Server
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.SERVER_HOST }}
      #     username: ${{ secrets.SERVER_USER }}
      #     key: ${{ secrets.SERVER_KEY }}
      #     script: |
      #       IMAGE_NAME=$(echo "${{ env.REGISTRY }}/${{ github.repository }}/project-a:latest" | tr '[:upper:]' '[:lower:]')
      #       docker pull $IMAGE_NAME
      #       docker stop project-a || true
      #       docker rm project-a || true
      #       docker run -d --name project-a -p 8080:8080 $IMAGE_NAME

  docker-project-b:
    needs: release
    if: needs.release.outputs.project_b_released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 登录 Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 project-b Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: ./project-b
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/project-b:${{ needs.release.outputs.project_b_tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}/project-b:latest

      # 暂时禁用：SSH 部署到服务器（需要时取消注释即可恢复）
      # - name: Deploy to Server
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.SERVER_HOST }}
      #     username: ${{ secrets.SERVER_USER }}
      #     key: ${{ secrets.SERVER_KEY }}
      #     script: |
      #       IMAGE_NAME=$(echo "${{ env.REGISTRY }}/${{ github.repository }}/project-b:latest" | tr '[:upper:]' '[:lower:]')
      #       docker pull $IMAGE_NAME
