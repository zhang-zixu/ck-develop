name: Release on Main

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  RELEASE_API_URL: http://127.0.0.1:8000

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装 Release API 依赖
        run: pip install -r release-api/requirements.txt

      - name: 启动 Release API
        working-directory: release-api
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf "$RELEASE_API_URL/health" && break
            sleep 1
          done

      - name: 调用 project-a 发布接口
        id: release_a
        run: |
          RESPONSE=$(curl -sf -X POST "$RELEASE_API_URL/release/project-a")
          echo "$RESPONSE" | jq .
          echo "changed=$(echo "$RESPONSE" | jq -r '.changed')" >> "$GITHUB_OUTPUT"
          echo "released=$(echo "$RESPONSE" | jq -r '.released')" >> "$GITHUB_OUTPUT"
          echo "tag=$(echo "$RESPONSE" | jq -r '.tag // empty')" >> "$GITHUB_OUTPUT"

      - name: 调用 project-b 发布接口
        id: release_b
        run: |
          RESPONSE=$(curl -sf -X POST "$RELEASE_API_URL/release/project-b")
          echo "$RESPONSE" | jq .
          echo "changed=$(echo "$RESPONSE" | jq -r '.changed')" >> "$GITHUB_OUTPUT"
          echo "released=$(echo "$RESPONSE" | jq -r '.released')" >> "$GITHUB_OUTPUT"
          echo "tag=$(echo "$RESPONSE" | jq -r '.tag // empty')" >> "$GITHUB_OUTPUT"

      - name: 推送 tag 和版本提交
        if: steps.release_a.outputs.released == 'true' || steps.release_b.outputs.released == 'true'
        run: git push origin main --tags

      - name: 登录 Container Registry
        if: steps.release_a.outputs.released == 'true' || steps.release_b.outputs.released == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 project-a Docker 镜像
        if: steps.release_a.outputs.released == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./project-a
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/project-a:${{ steps.release_a.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}/project-a:latest

      - name: 构建并推送 project-b Docker 镜像
        if: steps.release_b.outputs.released == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./project-b
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/project-b:${{ steps.release_b.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}/project-b:latest
